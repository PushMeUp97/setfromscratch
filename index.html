<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚡ NEON PONG | Classic Arcade Duel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Fira Code', 'Segoe UI', monospace;
      padding: 20px;
    }

    /* game container */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      border-radius: 2rem;
      padding: 1rem 1.5rem 1.8rem;
      background: rgba(10, 20, 30, 0.45);
      backdrop-filter: blur(2px);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.2);
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.3), 0 15px 35px rgba(0, 0, 0, 0.5);
      cursor: none;
      background: #010412;
      transition: all 0.2s;
    }

    /* scoreboard panel */
    .score-panel {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 3rem;
      background: rgba(0, 0, 0, 0.65);
      padding: 0.6rem 2.2rem;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      border: 1px solid cyan;
      box-shadow: 0 5px 12px rgba(0, 255, 255, 0.2);
    }

    .score-card {
      text-align: center;
    }

    .score-label {
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
      color: #8ec9ff;
      text-shadow: 0 0 5px #00ccff;
    }

    .score-value {
      font-size: 3.2rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #f0f9ff, #a0f0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px cyan;
      line-height: 1;
    }

    .controls-info {
      display: flex;
      gap: 1.8rem;
      font-size: 0.75rem;
      background: #0a0e1caa;
      padding: 0.4rem 1.4rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      color: #9cdbff;
      font-weight: bold;
    }

    .controls-info span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    kbd {
      background: #111;
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: bold;
      color: cyan;
      box-shadow: inset 0 1px 0 #ffffff30, 0 1px 0 black;
      font-family: monospace;
    }

    .reset-btn {
      background: linear-gradient(145deg, #1a2a3a, #0a121f);
      border: none;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1rem;
      padding: 8px 24px;
      border-radius: 60px;
      color: #bbf0ff;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 0 #001122;
      transition: 0.08s linear;
      border: 1px solid cyan;
    }

    .reset-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #001122;
    }

    .status-msg {
      font-size: 0.8rem;
      background: #00a6c430;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      font-weight: bold;
      color: #b5f0ff;
    }

    @media (max-width: 780px) {
      .score-value {
        font-size: 2.3rem;
      }
      .controls-info {
        font-size: 0.65rem;
        gap: 0.8rem;
      }
      .game-container {
        padding: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <canvas id="pongCanvas" width="1000" height="600"></canvas>

    <div class="score-panel">
      <div class="score-card">
        <div class="score-label">◀ PLAYER</div>
        <div class="score-value" id="leftScore">0</div>
      </div>
      <div class="score-card">
        <div class="score-label">AI ▶</div>
        <div class="score-value" id="rightScore">0</div>
      </div>
    </div>

    <div class="controls-info">
      <span>🔼 <kbd>↑</kbd> & <kbd>↓</kbd> </span>
      <span>⚡ NEON DUEL</span>
      <span>🔄 <kbd>R</kbd> reset</span>
    </div>
    <button class="reset-btn" id="resetGameBtn">⟳ RESTART MATCH</button>
    <div class="status-msg" id="gameStatus">🏓 PRESS ↑ ↓  |  READY</div>
  </div>
</div>

<script>
  (function(){
    // ----- CANVAS ELEMENTS -----
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    // ----- GAME DIMENSIONS -----
    const CANVAS_W = 1000;
    const CANVAS_H = 600;
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;

    // ----- GAME OBJECTS -----
    // Paddle settings
    const PADDLE_W = 12;
    const PADDLE_H = 110;
    const LEFT_PADDLE_X = 20;
    const RIGHT_PADDLE_X = CANVAS_W - 20 - PADDLE_W;

    let leftPaddleY = (CANVAS_H / 2) - (PADDLE_H / 2);
    let rightPaddleY = (CANVAS_H / 2) - (PADDLE_H / 2);

    // Ball settings
    const BALL_RADIUS = 7;
    let ball = {
      x: CANVAS_W/2,
      y: CANVAS_H/2,
      dx: 0,
      dy: 0,
    };

    // Scores
    let leftScore = 0;
    let rightScore = 0;
    const WINNING_SCORE = 7;   // first to 7 wins -> match point freez? but game continues fun

    // Game flow flags
    let ballActive = true;      // ball moves when true
    let cooldownTimer = false;  // cooldown after score before ball respawn
    let gameOverFlag = false;    // if someone reaches winning score, show winner and disable ball

    // AI & Movement params (delta based)
    let leftMoveUp = false;
    let leftMoveDown = false;
    const PADDLE_SPEED = 560;   // pixels per second
    const AI_SPEED = 460;       // AI reaction speed (smooth but challenging)
    const BALL_SPEED_BASE = 390; // pixels per second

    // Animation and timing
    let lastTimestamp = 0;
    let animFrameId = null;

    // DOM elements
    const leftScoreElem = document.getElementById('leftScore');
    const rightScoreElem = document.getElementById('rightScore');
    const resetBtn = document.getElementById('resetGameBtn');
    const statusDiv = document.getElementById('gameStatus');

    // ----- helper functions -----
    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    // reset ball after scoring (center, new random direction)
    function resetBallPosition(afterScored = true) {
      ball.x = CANVAS_W/2;
      ball.y = CANVAS_H/2;
      // random direction angle between -40deg to 40deg from horizontal
      let angle = (Math.random() * Math.PI/2.2) - Math.PI/4.2; // roughly -45 to +45
      // serve direction: towards the loser? -> but to keep fair, random left/right, but classic
      let direction = Math.random() < 0.5 ? 1 : -1;
      let rawDx = Math.cos(angle) * BALL_SPEED_BASE * direction;
      let rawDy = Math.sin(angle) * BALL_SPEED_BASE;
      // ensure enough horizontal speed
      ball.dx = (Math.abs(rawDx) < 180) ? (direction * 210) : rawDx;
      ball.dy = rawDy;
      // avoid too steep vertical
      if(Math.abs(ball.dy) < 100) ball.dy = (ball.dy > 0 ? 130 : -130);
      // limit max vertical speed
      ball.dy = clamp(ball.dy, -420, 420);
      ball.dx = clamp(ball.dx, -520, 520);
      if(Math.abs(ball.dx) < 180) ball.dx = ball.dx > 0 ? 210 : -210;
    }

    // start cooldown after a goal (freeze ball briefly)
    function startScoreCooldown() {
      if(cooldownTimer) return;
      ballActive = false;
      cooldownTimer = true;
      statusDiv.innerText = gameOverFlag ? (leftScore >= WINNING_SCORE ? "🏆 PLAYER WINS! press reset" : "🤖 AI WINS! press reset") : "⚡ GOAL! READY...";
      setTimeout(() => {
        if(!gameOverFlag) {
          resetBallPosition(true);
          ballActive = true;
          statusDiv.innerText = "🔥 IN PLAY | MOVE ↑↓";
        } else {
          ballActive = false;
          statusDiv.innerText = (leftScore >= WINNING_SCORE) ? "✨ HUMAN VICTORY! press RESTART ✨" : "💀 AI DOMINATION | press RESTART";
        }
        cooldownTimer = false;
      }, 1100);
    }

    // update UI scores + check win condition
    function updateScoresUI() {
      leftScoreElem.innerText = leftScore;
      rightScoreElem.innerText = rightScore;
      if(leftScore >= WINNING_SCORE || rightScore >= WINNING_SCORE) {
        if(!gameOverFlag) {
          gameOverFlag = true;
          ballActive = false;
          const winnerMsg = leftScore >= WINNING_SCORE ? "🏆 PLAYER VICTORY! 🏆" : "🤖 AI WINS THE MATCH";
          statusDiv.innerText = winnerMsg + "  •  PRESS RESET";
        }
      } else {
        if(gameOverFlag) gameOverFlag = false;
      }
    }

    // fully reset game state
    function fullResetGame() {
      leftScore = 0;
      rightScore = 0;
      leftPaddleY = (CANVAS_H/2) - (PADDLE_H/2);
      rightPaddleY = (CANVAS_H/2) - (PADDLE_H/2);
      gameOverFlag = false;
      ballActive = true;
      if(cooldownTimer) {
        clearTimeout(); // just avoid side effect, but let's stop ongoing timeout
      }
      cooldownTimer = false;
      resetBallPosition(true);
      // reset velocity randomization
      let angle = (Math.random() * Math.PI/2.2) - Math.PI/4.2;
      let direction = Math.random() < 0.5 ? 1 : -1;
      ball.dx = Math.cos(angle) * BALL_SPEED_BASE * direction;
      ball.dy = Math.sin(angle) * BALL_SPEED_BASE;
      if(Math.abs(ball.dx) < 180) ball.dx = ball.dx > 0 ? 230 : -230;
      ball.dy = clamp(ball.dy, -400, 400);
      
      updateScoresUI();
      statusDiv.innerText = "🔄 NEW MATCH! MOVE ↑ ↓";
      setTimeout(() => {
        if(!gameOverFlag && !cooldownTimer) statusDiv.innerText = "🔥 BATTLE READY";
      }, 1400);
    }

    // check collision & scoring
    function handleCollisionAndScore(deltaTime) {
      if(!ballActive || gameOverFlag) return;
      
      // ball movement (delta time integrated)
      let moveX = ball.dx * deltaTime;
      let moveY = ball.dy * deltaTime;
      let newX = ball.x + moveX;
      let newY = ball.y + moveY;
      
      // ---- Top/Bottom walls collision ----
      if(newY - BALL_RADIUS <= 0) {
        newY = BALL_RADIUS + 1;
        ball.dy = -ball.dy;
      }
      if(newY + BALL_RADIUS >= CANVAS_H) {
        newY = CANVAS_H - BALL_RADIUS - 1;
        ball.dy = -ball.dy;
      }
      
      // ---- Left Paddle collision (player) ----
      if(newX - BALL_RADIUS <= LEFT_PADDLE_X + PADDLE_W && ball.x - BALL_RADIUS > LEFT_PADDLE_X + PADDLE_W - 2) {
        if(newY + BALL_RADIUS >= leftPaddleY && newY - BALL_RADIUS <= leftPaddleY + PADDLE_H) {
          // collide left paddle
          let collidePoint = newY - (leftPaddleY + PADDLE_H/2);
          collidePoint = Math.max(-PADDLE_H/2, Math.min(PADDLE_H/2, collidePoint));
          let angleRad = (collidePoint / (PADDLE_H/2)) * (Math.PI / 3.4);
          let direction = 1;
          let speed = Math.hypot(ball.dx, ball.dy);
          let newDx = Math.abs(Math.cos(angleRad) * speed);
          ball.dx = newDx * direction;
          ball.dy = Math.sin(angleRad) * speed;
          // add slight speed multiplier for intensity
          if(Math.abs(ball.dx) < 190) ball.dx = ball.dx > 0 ? 210 : -210;
          ball.dx = Math.abs(ball.dx);
          // push ball right side
          newX = LEFT_PADDLE_X + PADDLE_W + BALL_RADIUS + 1;
          // extra bounce tone feel
        }
      }
      
      // ---- Right Paddle collision (AI) ----
      if(newX + BALL_RADIUS >= RIGHT_PADDLE_X && ball.x + BALL_RADIUS < RIGHT_PADDLE_X + 3) {
        if(newY + BALL_RADIUS >= rightPaddleY && newY - BALL_RADIUS <= rightPaddleY + PADDLE_H) {
          let collidePoint = newY - (rightPaddleY + PADDLE_H/2);
          collidePoint = Math.max(-PADDLE_H/2, Math.min(PADDLE_H/2, collidePoint));
          let angleRad = (collidePoint / (PADDLE_H/2)) * (Math.PI / 3.4);
          let speed = Math.hypot(ball.dx, ball.dy);
          let newDx = Math.abs(Math.cos(angleRad) * speed);
          ball.dx = -newDx;
          ball.dy = Math.sin(angleRad) * speed;
          if(Math.abs(ball.dx) < 180) ball.dx = ball.dx > 0 ? 210 : -210;
          newX = RIGHT_PADDLE_X - BALL_RADIUS - 1;
        }
      }
      
      // update ball position
      ball.x = newX;
      ball.y = newY;
      
      // ---- SCORE DETECTION (out of bounds left/right) ----
      if(ball.x + BALL_RADIUS < 0) {
        // right player (AI) scores
        if(!gameOverFlag && !cooldownTimer) {
          rightScore++;
          updateScoresUI();
          startScoreCooldown();
        } else if(!gameOverFlag){
          // during cooldown ignore multiple events
        }
        if(!gameOverFlag) ballActive = false;
        ball.x = CANVAS_W/2;
        ball.y = CANVAS_H/2;
        return;
      }
      else if(ball.x - BALL_RADIUS > CANVAS_W) {
        if(!gameOverFlag && !cooldownTimer) {
          leftScore++;
          updateScoresUI();
          startScoreCooldown();
        }
        if(!gameOverFlag) ballActive = false;
        ball.x = CANVAS_W/2;
        ball.y = CANVAS_H/2;
        return;
      }
    }
    
    // AI movement (based on delta seconds)
    function updateAI(deltaSec) {
      if(gameOverFlag) return;
      let targetY = ball.y - (PADDLE_H/2);
      // simple smooth AI with max speed
      let diff = targetY - rightPaddleY;
      let move = 0;
      if(Math.abs(diff) > 5) {
        move = Math.min(AI_SPEED * deltaSec, Math.abs(diff)) * Math.sign(diff);
      }
      rightPaddleY += move;
      rightPaddleY = clamp(rightPaddleY, 0, CANVAS_H - PADDLE_H);
    }
    
    // player keyboard movement delta time
    function updatePlayerMovement(deltaSec) {
      if(gameOverFlag) return;
      let moveDelta = 0;
      if(leftMoveUp) moveDelta = -PADDLE_SPEED * deltaSec;
      if(leftMoveDown) moveDelta = PADDLE_SPEED * deltaSec;
      leftPaddleY += moveDelta;
      leftPaddleY = clamp(leftPaddleY, 0, CANVAS_H - PADDLE_H);
    }
    
    // ---------- RENDERING (Neon Arcade Style) ----------
    function drawNet() {
      ctx.beginPath();
      ctx.setLineDash([12, 20]);
      ctx.strokeStyle = "#00ffffaa";
      ctx.lineWidth = 2.5;
      ctx.moveTo(CANVAS_W/2, 0);
      ctx.lineTo(CANVAS_W/2, CANVAS_H);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    
    function drawPaddle(x, y, side) {
      ctx.shadowBlur = 12;
      ctx.shadowColor = "#0ff";
      const grad = ctx.createLinearGradient(x, y, x+PADDLE_W, y+PADDLE_H);
      grad.addColorStop(0, side === 'left' ? '#2affb6' : '#1ea5ff');
      grad.addColorStop(1, side === 'left' ? '#00c3ff' : '#00a6ff');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, PADDLE_W, PADDLE_H);
      ctx.fillStyle = "#ffffffcc";
      ctx.fillRect(x+2, y+4, 3, PADDLE_H-8);
      ctx.shadowBlur = 0;
    }
    
    function drawBall() {
      ctx.shadowBlur = 14;
      ctx.shadowColor = "#0ffc";
      ctx.beginPath();
      const radGrad = ctx.createRadialGradient(ball.x-3, ball.y-3, 2, ball.x, ball.y, BALL_RADIUS);
      radGrad.addColorStop(0, "#fffeca");
      radGrad.addColorStop(1, "#ffb347");
      ctx.fillStyle = radGrad;
      ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_RADIUS-2, 0, Math.PI*2);
      ctx.fillStyle = "#ffec80";
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    function drawGlow() {
      ctx.shadowBlur = 0;
      ctx.font = "bold 22px 'Courier New'";
      ctx.fillStyle = "#4effdc30";
      ctx.fillText("◀", 40, 50);
      ctx.fillText("▶", CANVAS_W-70, 50);
    }
    
    function render() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      // background grid effect
      ctx.fillStyle = "#010412";
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      for(let i=0;i<80;i+=20){
        ctx.beginPath();
        ctx.strokeStyle = "#00aaff10";
        ctx.lineWidth = 1;
        ctx.moveTo(i*12 % CANVAS_W, 0);
        ctx.lineTo(i*7 % CANVAS_W, CANVAS_H);
        ctx.stroke();
      }
      drawNet();
      drawPaddle(LEFT_PADDLE_X, leftPaddleY, 'left');
      drawPaddle(RIGHT_PADDLE_X, rightPaddleY, 'right');
      drawBall();
      drawGlow();
      // score overlay on canvas extra
      ctx.font = "500 28monospace";
      ctx.fillStyle = "#caf0ff";
      ctx.shadowBlur = 0;
    }
    
    // ----- GAME LOOP (delta time) -----
    function gameLoop(nowMs) {
      if(!lastTimestamp) {
        lastTimestamp = nowMs;
        animFrameId = requestAnimationFrame(gameLoop);
        render();
        return;
      }
      let delta = Math.min(0.033, (nowMs - lastTimestamp) / 1000); // max 33ms
      if(delta <= 0) {
        lastTimestamp = nowMs;
        animFrameId = requestAnimationFrame(gameLoop);
        render();
        return;
      }
      // Update game mechanics if not game over and ball active, but always move paddles
      updatePlayerMovement(delta);
      updateAI(delta);
      
      if(ballActive && !gameOverFlag && !cooldownTimer) {
        // simulate collision and scoring inside
        handleCollisionAndScore(delta);
      } else if(!gameOverFlag && cooldownTimer) {
        // do nothing, ball frozen but render already
      } else if(gameOverFlag){
        // disable ball movement already
      }
      
      render();
      lastTimestamp = nowMs;
      animFrameId = requestAnimationFrame(gameLoop);
    }
    
    // ----- KEYBOARD CONTROLS -----
    function handleKeyDown(e) {
      const key = e.key;
      if(key === 'ArrowUp') {
        leftMoveUp = true;
        e.preventDefault();
      } else if(key === 'ArrowDown') {
        leftMoveDown = true;
        e.preventDefault();
      } else if(key === 'r' || key === 'R') {
        fullResetGame();
        e.preventDefault();
      }
    }
    
    function handleKeyUp(e) {
      const key = e.key;
      if(key === 'ArrowUp') {
        leftMoveUp = false;
        e.preventDefault();
      } else if(key === 'ArrowDown') {
        leftMoveDown = false;
        e.preventDefault();
      }
    }
    
    // disable page scroll with arrows
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    resetBtn.addEventListener('click', () => fullResetGame());
    
    // initial reset and start
    fullResetGame();
    // small delay to init ball direction
    setTimeout(() => {
      if(!gameOverFlag) ballActive = true;
    }, 100);
    // start animation
    animFrameId = requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
